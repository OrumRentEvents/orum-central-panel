<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUM Rutas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0efeb; color: #1a1a18; min-height: 100vh; }

/* PIN */
#pin-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.pin-box { background: #fff; border: 0.5px solid #e2e2de; border-radius: 16px; padding: 2rem 1.5rem; width: 100%; max-width: 320px; text-align: center; }
.pin-logo { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: #1a1a18; margin-bottom: 4px; }
.pin-subtitle { font-size: 12px; color: #9a988f; margin-bottom: 1.5rem; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #ccc; background: #fff; }
.pin-dot.filled { background: #1a1a18; border-color: #1a1a18; }
.pin-dot.error { background: #A32D2D; border-color: #A32D2D; }
.pin-error { font-size: 12px; color: #A32D2D; height: 16px; margin-bottom: 1rem; }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-key { background: #f7f6f2; border: 0.5px solid #e2e2de; border-radius: 10px; padding: 16px 8px; font-size: 20px; color: #1a1a18; cursor: pointer; }
.pin-key:active { background: #e2e2de; }
.pin-key.empty { background: transparent; border-color: transparent; }

/* CABECERA */
.app-header { background: #1a1a18; color: #fff; padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.header-top h1 { font-size: 14px; font-weight: 500; }
.btn-sm { background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
.btn-sm.active { background: rgba(255,255,255,0.25); }
.header-nav { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.header-nav input[type=date] { background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; padding: 3px 8px; font-size: 12px; }
.header-nav input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
.header-stats { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* CUERPO */
#app-body { padding: 10px 12px 80px; max-width: 1200px; margin: 0 auto; }
.loading { text-align: center; padding: 3rem 1rem; color: #6b6a64; font-size: 14px; }

/* GRUPO VEHICULO */
.grupo-vehiculo { margin-bottom: 12px; }
.grupo-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; background: #1a1a18; color: #fff;
  border-radius: 8px 8px 0 0; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.grupo-header.sin-asignar { background: #6b6a64; }
.grupo-count { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 1px 7px; font-size: 11px; }

/* TABLA FILAS */
.tabla-rutas { width: 100%; border-collapse: collapse; background: #fff; border-radius: 0 0 8px 8px; overflow: hidden; border: 0.5px solid #e2e2de; }
.tabla-rutas thead th {
  padding: 7px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: #6b6a64; background: #f7f6f2;
  border-bottom: 0.5px solid #e2e2de; white-space: nowrap; text-align: left;
}
.fila-parada { border-bottom: 0.5px solid #f0f0ec; cursor: pointer; transition: background 0.1s; }
.fila-parada:last-child { border-bottom: none; }
.fila-parada:hover { background: #fafaf8; }
.fila-parada.expandida { background: #fafaf8; }
.fila-parada td { padding: 8px 10px; font-size: 13px; vertical-align: middle; }
.fila-parada .td-orden { width: 32px; text-align: center; }
.btn-orden { background: none; border: none; color: #ccc; font-size: 14px; cursor: pointer; padding: 2px 4px; display: block; line-height: 1; }
.btn-orden:hover { color: #1a1a18; }
.td-tipo { width: 80px; }
.badge-tipo { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.3px; white-space: nowrap; }
.badge-entrega { background: #E1F5EE; color: #0F6E56; }
.badge-recogida { background: #FAEEDA; color: #854F0B; }
.badge-otro { background: #E6F1FB; color: #185FA5; }
.badge-manual { background: #EEEDFE; color: #3C3489; }
.td-fecha { width: 85px; white-space: nowrap; color: #6b6a64; font-size: 12px; }
.td-cliente { min-width: 160px; font-weight: 500; }
.td-num { font-size: 11px; color: #9a988f; }
.td-loc { color: #6b6a64; font-size: 12px; }
.btn-maps { font-size: 10px; background: #E6F1FB; color: #185FA5; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; text-decoration: none; white-space: nowrap; margin-left: 4px; }
.td-estado { width: 90px; }
.badge-estado { font-size: 10px; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.estado-listo { background: #E1F5EE; color: #0F6E56; }
.estado-conf { background: #E6F1FB; color: #185FA5; }
.td-vehiculo { width: 120px; font-size: 12px; color: #1a1a18; }
.td-conductor { width: 100px; font-size: 12px; color: #1a1a18; }
.td-expand { width: 24px; text-align: center; color: #ccc; font-size: 11px; }

/* FILA EXPANDIDA */
.fila-detalle { display: none; background: #f7f6f2; }
.fila-detalle.open { display: table-row; }
.fila-detalle td { padding: 10px 12px; border-bottom: 0.5px solid #e2e2de; }
.detalle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
.detalle-campo label { font-size: 10px; color: #6b6a64; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 3px; }
.detalle-campo select, .detalle-campo input[type=text], .detalle-campo textarea {
  width: 100%; padding: 7px 9px; font-size: 13px; border: 0.5px solid #e2e2de;
  border-radius: 7px; background: #fff; color: #1a1a18; font-family: inherit;
}
.detalle-campo textarea { resize: vertical; min-height: 50px; }
.detalle-campo select:focus, .detalle-campo input:focus, .detalle-campo textarea:focus { outline: none; border-color: #1a1a18; }
.detalle-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
.btn-guardar { padding: 7px 16px; font-size: 13px; background: #1a1a18; color: #fff; border: none; border-radius: 7px; cursor: pointer; }
.btn-guardar:active { opacity: 0.8; }
.btn-guardar.ok { background: #1D9E75; }
.btn-del { padding: 7px 12px; font-size: 13px; background: #fff; color: #A32D2D; border: 0.5px solid #F09595; border-radius: 7px; cursor: pointer; }
.saved-msg { font-size: 12px; color: #1D9E75; }

/* FAB */
#fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #1a1a18; color: #fff; font-size: 26px; border: none; cursor: pointer; z-index: 50; display: none; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }

/* MODAL */
#modal-manual { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
#modal-manual.open { display: flex; }
.modal-box { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; padding: 0 0 2rem; max-height: 90vh; overflow-y: auto; }
.modal-header { padding: 14px 16px; border-bottom: 0.5px solid #e2e2de; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; }
.modal-header h2 { font-size: 15px; font-weight: 500; }
.modal-close { background: #f0f0ec; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; }
.modal-form { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.modal-form label { font-size: 11px; color: #6b6a64; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
.modal-form input, .modal-form select, .modal-form textarea { width: 100%; padding: 9px 12px; font-size: 14px; border: 0.5px solid #e2e2de; border-radius: 8px; background: #fff; color: #1a1a18; font-family: inherit; }
.modal-form textarea { resize: vertical; min-height: 50px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-guardar-modal { width: 100%; padding: 12px; font-size: 14px; font-weight: 500; background: #1a1a18; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 4px; }

/* TOAST */
#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 300; white-space: nowrap; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo">ORUM</div>
    <div class="pin-subtitle">Rutas - acceso logistica</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-keypad" id="keypad"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="app-header">
    <div class="header-top">
      <h1>ORUM Rutas</h1>
      <button class="btn-sm" id="btn-recargar">Recargar</button>
    </div>
    <div class="header-nav">
      <button class="btn-sm active" id="btn-hoy">Hoy</button>
      <button class="btn-sm" id="btn-semana">Esta semana</button>
      <input type="date" id="fecha-picker">
    </div>
    <div class="header-stats" id="header-stats"></div>
  </div>
  <div id="app-body"><div class="loading">Cargando...</div></div>
</div>

<button id="fab">+</button>

<div id="modal-manual">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Anadir parada manual</h2>
      <button class="modal-close" id="modal-close-btn">X</button>
    </div>
    <div class="modal-form">
      <div>
        <label>Tipo</label>
        <select id="m-tipo">
          <option value="ENTREGA">Entrega</option>
          <option value="RECOGIDA">Recogida</option>
          <option value="COMPRA">Compra</option>
          <option value="TALLER">Taller</option>
          <option value="OTRO">Otro</option>
        </select>
      </div>
      <div><label>Descripcion</label><input type="text" id="m-desc" placeholder="Ej: Recoger manteles sucios Marbella"></div>
      <div><label>Direccion</label><input type="text" id="m-dir" placeholder="Calle, ciudad..."></div>
      <div class="form-row">
        <div><label>Fecha</label><input type="date" id="m-fecha"></div>
        <div><label>Hora</label><input type="time" id="m-hora"></div>
      </div>
      <div><label>Vehiculo</label><select id="m-vehiculo"><option value="">Sin asignar</option></select></div>
      <div><label>Conductor</label><input type="text" id="m-conductor" placeholder="Nombre del conductor"></div>
      <div><label>Notas</label><textarea id="m-notas" placeholder="Notas adicionales..."></textarea></div>
      <button class="btn-guardar-modal" id="btn-guardar-modal">Guardar parada</button>
    </div>
  </div>
</div>

<div id="toast">OK</div>

<script>
var PIN_VALIDO = '2000';
var VEHICULOS = ['NISSAN','IVECO','VOLKSWAGEN','RENAULT','AZUL','FURGO NDL','FURGO NCW'];
var pinActual = '';
var modoFecha = 'hoy';
var paradasGlobal = [];
var ordenManual = {}; // clave: vehiculo -> array ordenado de indices

// ── PIN ──
function initKeypad() {
  var kp = document.getElementById('keypad');
  ['1','2','3','4','5','6','7','8','9','','0','del'].forEach(function(k) {
    var btn = document.createElement('button');
    if (k === '') { btn.className = 'pin-key empty'; }
    else if (k === 'del') {
      btn.className = 'pin-key'; btn.textContent = '<<';
      btn.addEventListener('click', pinBorrar);
    } else {
      btn.className = 'pin-key'; btn.textContent = k;
      (function(n) { btn.addEventListener('click', function() { pinKey(n); }); })(k);
    }
    kp.appendChild(btn);
  });
}
function pinKey(n) {
  if (pinActual.length >= 4) return;
  pinActual += n; actualizarDots(false);
  if (pinActual.length === 4) validarPin();
}
function pinBorrar() { pinActual = pinActual.slice(0,-1); document.getElementById('pin-error').textContent=''; actualizarDots(false); }
function actualizarDots(error) {
  for(var i=0;i<4;i++){var d=document.getElementById('d'+i);d.className='pin-dot';if(error)d.classList.add('error');else if(i<pinActual.length)d.classList.add('filled');}
}
function validarPin() {
  if (pinActual !== PIN_VALIDO) {
    document.getElementById('pin-error').textContent='PIN incorrecto'; actualizarDots(true);
    setTimeout(function(){pinActual='';actualizarDots(false);document.getElementById('pin-error').textContent='';},800); return;
  }
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('fab').style.display='flex';
  initVehiculosModal();
  setFechaHoy(); cargarDatos();
}

// ── FECHAS ──
function getHoy(){ var d=new Date(); return d.toISOString().split('T')[0]; }
function getSemana(){
  var d=new Date(); var dia=d.getDay()||7;
  var lunes=new Date(d); lunes.setDate(d.getDate()-dia+1);
  var domingo=new Date(lunes); domingo.setDate(lunes.getDate()+6);
  return {desde:lunes.toISOString().split('T')[0], hasta:domingo.toISOString().split('T')[0]};
}
function setFechaHoy(){ document.getElementById('fecha-picker').value=getHoy(); modoFecha='hoy'; }
function getRango(){
  if(modoFecha==='semana') return getSemana();
  var d=document.getElementById('fecha-picker').value||getHoy();
  return {desde:d,hasta:d};
}

// ── CARGA ──
function cargarDatos(){
  document.getElementById('app-body').innerHTML='<div class="loading">Cargando paradas...</div>';
  document.getElementById('header-stats').textContent='';
  var r=getRango();
  fetch('/api/rutas?desde='+r.desde+'&hasta='+r.hasta+'&token=ORUMx2026RutasPublic&t='+Date.now())
    .then(function(res){return res.json();})
    .then(function(data){
      if(data.error){document.getElementById('app-body').innerHTML='<div class="loading">Error: '+data.error+'</div>';return;}
      paradasGlobal=data.paradas||[];
      if(data.vehiculos) VEHICULOS=data.vehiculos;
      ordenManual={};
      renderizar();
    })
    .catch(function(){document.getElementById('app-body').innerHTML='<div class="loading">Error de conexion</div>';});
}

// ── RENDERIZAR ──
function renderizar(){
  var total=paradasGlobal.length;
  var conVeh=paradasGlobal.filter(function(p){return p.vehiculo;}).length;
  document.getElementById('header-stats').textContent=total+' paradas - '+conVeh+' con vehiculo asignado';

  // Agrupar por vehiculo
  var grupos={};
  var SIN='__sin_asignar__';
  paradasGlobal.forEach(function(p,idx){
    var veh=p.vehiculo||SIN;
    if(!grupos[veh]) grupos[veh]=[];
    grupos[veh].push(idx);
  });

  // Aplicar orden manual
  Object.keys(ordenManual).forEach(function(veh){
    if(grupos[veh]) grupos[veh]=ordenManual[veh];
  });

  var html='';

  // Primero grupos con vehiculo asignado
  var vehiculosUsados=Object.keys(grupos).filter(function(v){return v!==SIN;}).sort();
  vehiculosUsados.forEach(function(veh){
    html+=renderGrupo(veh, grupos[veh], false);
  });
  // Sin asignar al final
  if(grupos[SIN] && grupos[SIN].length){
    html+=renderGrupo('Sin vehiculo asignado', grupos[SIN], true);
  }

  if(!html) html='<div class="loading">No hay paradas en este periodo</div>';
  document.getElementById('app-body').innerHTML=html;

  // Eventos expand
  document.querySelectorAll('.fila-parada').forEach(function(fila){
    fila.addEventListener('click', function(e){
      if(e.target.closest('.btn-orden')||e.target.closest('.btn-guardar')||e.target.closest('.btn-del')||e.target.closest('select')||e.target.closest('input')||e.target.closest('textarea')||e.target.closest('.btn-maps')) return;
      var key=fila.getAttribute('data-key');
      var det=document.getElementById('det-'+key);
      if(det){ det.classList.toggle('open'); fila.classList.toggle('expandida'); }
    });
  });
  // Eventos guardar
  document.querySelectorAll('.btn-guardar').forEach(function(btn){
    btn.addEventListener('click', function(){ guardarFila(btn.getAttribute('data-key')); });
  });
  // Eventos eliminar
  document.querySelectorAll('.btn-del').forEach(function(btn){
    btn.addEventListener('click', function(){ eliminarManual(btn.getAttribute('data-id')); });
  });
  // Eventos orden
  document.querySelectorAll('.btn-orden').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      moverFila(btn.getAttribute('data-veh'), parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-dir'));
    });
  });
}

function renderGrupo(veh, indices, esSinAsignar){
  var SIN='__sin_asignar__';
  var vehKey=esSinAsignar?SIN:veh;
  var html='<div class="grupo-vehiculo">';
  html+='<div class="grupo-header'+(esSinAsignar?' sin-asignar':'')+'">'+veh+'<span class="grupo-count">'+indices.length+'</span></div>';
  html+='<table class="tabla-rutas"><thead><tr>';
  html+='<th style="width:32px"></th><th>Tipo</th><th>Fecha</th><th>Cliente</th><th>Ubicacion</th><th>Estado</th><th>Vehiculo</th><th>Conductor</th><th style="width:20px"></th>';
  html+='</tr></thead><tbody>';
  indices.forEach(function(idx, pos){
    html+=renderFila(idx, pos, indices.length, vehKey);
  });
  html+='</tbody></table></div>';
  return html;
}

function renderFila(idx, pos, total, vehKey){
  var p=paradasGlobal[idx];
  var key='p'+idx;
  var tipo=(p.tipo||'OTRO').toLowerCase();
  var badgeClass=p.es_manual?'badge-manual':'badge-'+tipo;
  var badgeTexto=p.es_manual?'MANUAL':p.tipo;
  var esListo=['returned','cargado','marbella','on location','controlado','preparado'].some(function(x){return(p.estado||'').toLowerCase().indexOf(x)!==-1;});
  var estadoHtml=p.estado?('<span class="badge-estado '+(esListo?'estado-listo':'estado-conf')+'">'+p.estado+'</span>'):'';
  var mapsHtml=p.google_maps_url?('<a href="'+p.google_maps_url+'" target="_blank" class="btn-maps">Maps</a>'):'';
  var fechaLabel=p.fecha?formatFechaCorta(p.fecha):'';
  var horaLabel=p.hora&&p.hora!='30/12/1899'?(' '+p.hora):'';

  // Opciones vehiculo
  var vehOpts='<option value="">Sin vehiculo</option>';
  VEHICULOS.forEach(function(v){ vehOpts+='<option value="'+v+'"'+(p.vehiculo===v?' selected':'')+'>'+v+'</option>'; });

  var pDataB64=btoa(unescape(encodeURIComponent(JSON.stringify({idx:idx,id_manual:p.id_manual,es_manual:p.es_manual}))));

  var html='<tr class="fila-parada" data-key="'+key+'" data-idx="'+idx+'">';
  // Orden
  html+='<td class="td-orden"><button class="btn-orden" data-veh="'+vehKey+'" data-idx="'+pos+'" data-dir="up">'+(pos>0?'↑':'')+'</button><button class="btn-orden" data-veh="'+vehKey+'" data-idx="'+pos+'" data-dir="down">'+(pos<total-1?'↓':'')+'</button></td>';
  html+='<td class="td-tipo"><span class="badge-tipo '+badgeClass+'">'+badgeTexto+'</span></td>';
  html+='<td class="td-fecha">'+fechaLabel+horaLabel+'</td>';
  html+='<td><div style="font-weight:500;font-size:13px;">'+(p.cliente||'-')+'</div>'+(p.numero?'<div class="td-num">#'+p.numero+'</div>':'')+'</td>';
  html+='<td class="td-loc">'+(p.localizacion||'-')+mapsHtml+'</td>';
  html+='<td class="td-estado">'+estadoHtml+'</td>';
  html+='<td class="td-vehiculo">'+(p.vehiculo||'<span style="color:#ccc">-</span>')+'</td>';
  html+='<td class="td-conductor">'+(p.conductor||'<span style="color:#ccc">-</span>')+'</td>';
  html+='<td class="td-expand">▾</td>';
  html+='</tr>';

  // Fila detalle expandible
  html+='<tr class="fila-detalle" id="det-'+key+'"><td colspan="9">';
  html+='<div class="detalle-grid">';
  html+='<div class="detalle-campo"><label>Vehiculo</label><select id="veh-'+key+'">'+vehOpts+'</select></div>';
  html+='<div class="detalle-campo"><label>Conductor</label><input type="text" id="cond-'+key+'" value="'+(p.conductor||'')+'" placeholder="Nombre conductor"></div>';
  html+='<div class="detalle-campo"><label>Notas</label><textarea id="notas-'+key+'" placeholder="Notas...">'+(p.notas||'')+'</textarea></div>';
  html+='</div>';
  html+='<div class="detalle-actions">';
  html+='<button class="btn-guardar" data-key="'+key+'" data-p="'+pDataB64+'">Guardar</button>';
  if(p.es_manual) html+='<button class="btn-del" data-id="'+p.id_manual+'">Eliminar</button>';
  html+='<span class="saved-msg" id="msg-'+key+'"></span>';
  html+='</div></td></tr>';

  return html;
}

function formatFechaCorta(iso){
  if(!iso) return '';
  var dias=['dom','lun','mar','mie','jue','vie','sab'];
  var d=new Date(iso+'T12:00:00');
  return dias[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1);
}

function moverFila(vehKey, pos, dir){
  var SIN='__sin_asignar__';
  // Reconstruir el array de indices del grupo
  var grupos={};
  paradasGlobal.forEach(function(p,idx){
    var v=p.vehiculo||SIN;
    if(!grupos[v]) grupos[v]=[];
    grupos[v].push(idx);
  });
  Object.keys(ordenManual).forEach(function(v){ if(grupos[v]) grupos[v]=ordenManual[v]; });

  var arr=grupos[vehKey];
  if(!arr) return;
  var newPos=dir==='up'?pos-1:pos+1;
  if(newPos<0||newPos>=arr.length) return;
  var tmp=arr[pos]; arr[pos]=arr[newPos]; arr[newPos]=tmp;
  ordenManual[vehKey]=arr;
  renderizar();
}

function guardarFila(key){
  var btn=document.querySelector('.btn-guardar[data-key="'+key+'"]');
  var pB64=btn.getAttribute('data-p');
  var pData; try { pData=JSON.parse(decodeURIComponent(escape(atob(pB64)))); } catch(e){return;}

  var vehiculo=document.getElementById('veh-'+key).value;
  var conductor=document.getElementById('cond-'+key).value;
  var notas=document.getElementById('notas-'+key).value;
  var idx=pData.idx;

  btn.textContent='...'; btn.disabled=true;

  var body={
    action: pData.es_manual?'update_manual':'update_manual',
    vehiculo:vehiculo, conductor:conductor, notas:notas,
    clientToken:'ORUMx2026RutasPublic'
  };
  if(pData.es_manual){ body.id=pData.id_manual; }
  else { body.id='proj_'+idx+'_'+paradasGlobal[idx].tipo+'_'+paradasGlobal[idx].fecha; }

  fetch('/api/rutas/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(){
      // Actualizar cache local
      paradasGlobal[idx].vehiculo=vehiculo;
      paradasGlobal[idx].conductor=conductor;
      paradasGlobal[idx].notas=notas;
      btn.textContent='Guardado'; btn.classList.add('ok');
      var msg=document.getElementById('msg-'+key);
      if(msg) msg.textContent='Guardado';
      mostrarToast('Guardado');
      setTimeout(function(){ btn.textContent='Guardar'; btn.classList.remove('ok'); btn.disabled=false; if(msg)msg.textContent=''; renderizar(); },1500);
    })
    .catch(function(){ btn.textContent='Error'; btn.disabled=false; });
}

function eliminarManual(id){
  if(!confirm('Eliminar esta parada?')) return;
  fetch('/api/rutas/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'del_manual',id:id,clientToken:'ORUMx2026RutasPublic'})})
    .then(function(){ mostrarToast('Parada eliminada'); cargarDatos(); });
}

// ── MODAL MANUAL ──
function initVehiculosModal(){
  var sel=document.getElementById('m-vehiculo');
  sel.innerHTML='<option value="">Sin asignar</option>';
  VEHICULOS.forEach(function(v){ var o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}
function abrirModal(){
  document.getElementById('m-fecha').value=document.getElementById('fecha-picker').value||getHoy();
  document.getElementById('m-hora').value='09:00';
  document.getElementById('m-desc').value='';
  document.getElementById('m-dir').value='';
  document.getElementById('m-conductor').value='';
  document.getElementById('m-vehiculo').value='';
  document.getElementById('m-notas').value='';
  document.getElementById('modal-manual').classList.add('open');
  document.body.style.overflow='hidden';
}
function cerrarModal(){ document.getElementById('modal-manual').classList.remove('open'); document.body.style.overflow=''; }
function guardarManual(){
  var body={
    action:'add_manual',
    tipo:document.getElementById('m-tipo').value,
    descripcion:document.getElementById('m-desc').value,
    direccion:document.getElementById('m-dir').value,
    fecha:document.getElementById('m-fecha').value,
    hora:document.getElementById('m-hora').value,
    vehiculo:document.getElementById('m-vehiculo').value,
    conductor:document.getElementById('m-conductor').value,
    notas:document.getElementById('m-notas').value,
    clientToken:'ORUMx2026RutasPublic'
  };
  if(!body.descripcion){alert('La descripcion es obligatoria');return;}
  if(!body.fecha){alert('La fecha es obligatoria');return;}
  var btn=document.getElementById('btn-guardar-modal');
  btn.textContent='Guardando...'; btn.disabled=true;
  fetch('/api/rutas/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(){cerrarModal();mostrarToast('Parada anadida');cargarDatos();btn.textContent='Guardar parada';btn.disabled=false;})
    .catch(function(){btn.textContent='Error';btn.disabled=false;});
}

function mostrarToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ── EVENTOS ──
document.addEventListener('DOMContentLoaded',function(){
  initKeypad();
  document.getElementById('btn-recargar').addEventListener('click',cargarDatos);
  document.getElementById('fab').addEventListener('click',abrirModal);
  document.getElementById('modal-close-btn').addEventListener('click',cerrarModal);
  document.getElementById('btn-guardar-modal').addEventListener('click',guardarManual);
  document.getElementById('btn-hoy').addEventListener('click',function(){
    modoFecha='hoy'; this.classList.add('active'); document.getElementById('btn-semana').classList.remove('active'); cargarDatos();
  });
  document.getElementById('btn-semana').addEventListener('click',function(){
    modoFecha='semana'; this.classList.add('active'); document.getElementById('btn-hoy').classList.remove('active'); cargarDatos();
  });
  document.getElementById('fecha-picker').addEventListener('change',function(){
    modoFecha='hoy'; document.getElementById('btn-hoy').classList.add('active'); document.getElementById('btn-semana').classList.remove('active'); cargarDatos();
  });
  document.getElementById('modal-manual').addEventListener('click',function(e){ if(e.target===this) cerrarModal(); });
});
</script>
