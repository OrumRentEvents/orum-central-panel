<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ORUM Rutas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eeeee9;color:#1a1a18;min-height:100vh;}

/* PIN */
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.pin-box{background:#fff;border:0.5px solid #e2e2de;border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:300px;text-align:center;}
.pin-logo{font-size:13px;font-weight:600;letter-spacing:2px;margin-bottom:4px;}
.pin-sub{font-size:12px;color:#9a988f;margin-bottom:1.5rem;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;background:#fff;}
.pin-dot.filled{background:#1a1a18;border-color:#1a1a18;}
.pin-dot.error{background:#A32D2D;border-color:#A32D2D;}
.pin-err{font-size:12px;color:#A32D2D;height:16px;margin-bottom:1rem;}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-k{background:#f7f6f2;border:0.5px solid #e2e2de;border-radius:10px;padding:16px 8px;font-size:20px;color:#1a1a18;cursor:pointer;}
.pin-k:active{background:#e2e2de;}
.pin-k.empty{background:transparent;border-color:transparent;}

/* HEADER */
.hdr{background:#1a1a18;color:#fff;padding:10px 14px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.hdr-top h1{font-size:14px;font-weight:500;}
.btn-s{background:rgba(255,255,255,.12);border:.5px solid rgba(255,255,255,.25);color:#fff;font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;}
.btn-s.on{background:rgba(255,255,255,.28);}
.hdr-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hdr-nav input[type=date]{background:rgba(255,255,255,.12);border:.5px solid rgba(255,255,255,.25);color:#fff;border-radius:6px;padding:3px 8px;font-size:12px;}
.hdr-nav input::-webkit-calendar-picker-indicator{filter:invert(1);}
.hdr-stats{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;}

/* BODY */
#body{padding:10px 12px 80px;max-width:1280px;margin:0 auto;}
.load{text-align:center;padding:3rem;color:#6b6a64;font-size:14px;}

/* DIA SEPARADOR */
.dia-sep{font-size:13px;font-weight:700;color:#1a1a18;padding:16px 2px 8px;margin-top:6px;border-bottom:2px solid #1a1a18;margin-bottom:10px;letter-spacing:.2px;}
.dia-sep:first-child{padding-top:4px;}

/* GRUPO */
.grupo{margin-bottom:12px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.grupo-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#1a1a18;color:#fff;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;position:relative;}
.grupo-hdr.sin{background:#7a7a72;}
.grupo-hdr-left{display:flex;align-items:center;gap:8px;}
.grupo-hdr-right{display:flex;align-items:center;gap:6px;}
.grupo-conductor{font-size:12px;font-weight:600;color:#fff;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;opacity:.9;}
.btn-wa{background:rgba(255,255,255,.12);border:.5px solid rgba(255,255,255,.25);color:#fff;font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;}
.btn-wa:hover{background:rgba(255,255,255,.22);}
/* fila compartida */
.fila.compartida{background:#FFFBEF !important;border-left:3px solid #E8A020 !important;}
.fila.compartida:hover{background:#FFF7E0 !important;}
/* zona drop */
.grupo-drop-zone{height:6px;border-radius:4px;margin:2px 0;transition:all .15s;}
.grupo-drop-zone.drag-over-zone{background:#1D9E75;height:14px;}

/* TABLA — columnas con ancho fijo para que no se muevan */
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 8px 8px;border:.5px solid #ddddd8;overflow:hidden;table-layout:fixed;}
.tbl thead th{padding:5px 8px;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9a988f;background:#f7f6f2;border-bottom:.5px solid #e2e2de;text-align:left;white-space:nowrap;overflow:hidden;}
.fila{border-bottom:.5px solid #f0f0ea;transition:background .1s;}
.fila:last-child{border-bottom:none;}
.fila:hover{background:#fafaf6;}
.fila.exp{background:#fafaf6;}
.fila.drag-over-top{border-top:2px solid #1D9E75 !important;}
.fila.drag-over-bottom{border-bottom:2px solid #1D9E75 !important;}
.fila[draggable=true]{cursor:grab;}
.fila[draggable=true]:active{cursor:grabbing;}
.fila td{padding:6px 8px;font-size:12px;vertical-align:middle;}
.fila.compartida{background:#FFFBEF !important;border-left:3px solid #E8A020 !important;}
.fila.compartida:hover{background:#FFF7E0 !important;}

/* Anchos de columna */
.td-drag{width:20px;text-align:center;color:#d0d0ca;font-size:12px;cursor:grab;}
.td-tipo{width:78px;}
.td-fecha{width:68px;white-space:nowrap;color:#9a988f;font-size:11px;}
.td-num{width:72px;}
.num-proy{font-size:13px;font-weight:700;color:#1a1a18;cursor:pointer;padding:2px 5px;border-radius:5px;display:inline-block;}
.num-proy:hover{background:#f0f0ea;}
.num-proy.copiado{color:#1D9E75;}
.td-cli{font-size:12px;font-weight:500;color:#1a1a18;}
.td-loc{color:#6b6a64;font-size:11px;}
.a-maps{font-size:10px;background:#E6F1FB;color:#185FA5;border:none;border-radius:4px;padding:1px 5px;cursor:pointer;text-decoration:none;white-space:nowrap;margin-left:3px;}
.td-est{width:90px;}
.td-veh{width:110px;font-size:11px;color:#4a4944;}
.td-notas{font-size:11px;color:#9a988f;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0;}
.td-exp{width:18px;text-align:center;color:#ccc;font-size:10px;}

/* Badges tipo */
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.4px;white-space:nowrap;text-transform:uppercase;}
.b-entrega{background:#D6F5E3;color:#0A6640;}
.b-recogida{background:#FDEBD0;color:#8B4A00;}
.b-otro{background:#E6F1FB;color:#185FA5;}
.b-manual{background:#EEEDFE;color:#3C3489;}
.b-compra{background:#FFF3E0;color:#8B4513;}
.b-taller{background:#FCE4EC;color:#880E4F;}

/* Badges estado */
.be{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;}
.be-ok{background:#D6F5E3;color:#0A6640;}
.be-cf{background:#E6F1FB;color:#185FA5;}

/* DETALLE EXPAND */
.fila-det{display:none;background:#f5f5f0;}
.fila-det.open{display:table-row;}
.fila-det td{padding:10px 12px;border-bottom:.5px solid #e2e2de;}
.det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
.det-campo label{font-size:10px;color:#6b6a64;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px;}
.det-campo input,.det-campo select,.det-campo textarea{width:100%;padding:7px 9px;font-size:13px;border:.5px solid #e2e2de;border-radius:7px;background:#fff;color:#1a1a18;font-family:inherit;}
.det-campo textarea{resize:vertical;min-height:44px;}
.det-campo input:focus,.det-campo select:focus,.det-campo textarea:focus{outline:none;border-color:#1a1a18;}
.det-acts{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.btn-g{padding:6px 14px;font-size:13px;background:#1a1a18;color:#fff;border:none;border-radius:7px;cursor:pointer;}
.btn-g.ok{background:#1D9E75;}
.btn-g.del{background:#fff;color:#A32D2D;border:.5px solid #F09595;}
.msg-ok{font-size:12px;color:#1D9E75;}

/* CAMBIO 2: checkboxes vehículos múltiples */
.vehs-checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.veh-check-lbl{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;padding:5px 10px;border:.5px solid #e2e2de;border-radius:7px;background:#fff;}
.veh-check-lbl input[type=checkbox]{width:14px;height:14px;cursor:pointer;}
.veh-check-lbl.seleccionado{background:#e6f1fb;border-color:#378ADD;color:#0C447C;}

/* VUELTAS */
.vuelta-sel{padding:4px 7px;font-size:12px;border:.5px solid #e2e2de;border-radius:6px;background:#fff;}

/* FAB */
#fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:#1a1a18;color:#fff;font-size:26px;border:none;cursor:pointer;z-index:50;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.25);}

/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
#modal.open{display:flex;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;padding:0 0 2rem;max-height:92vh;overflow-y:auto;}
.modal-hdr{padding:14px 16px;border-bottom:.5px solid #e2e2de;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;}
.modal-hdr h2{font-size:15px;font-weight:500;}
.modal-cls{background:#f0f0ec;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;}
.modal-form{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.modal-form label{font-size:11px;color:#6b6a64;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.modal-form input,.modal-form select,.modal-form textarea{width:100%;padding:9px 12px;font-size:14px;border:.5px solid #e2e2de;border-radius:8px;background:#fff;color:#1a1a18;font-family:inherit;}
.modal-form textarea{resize:vertical;min-height:50px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-gm{width:100%;padding:12px;font-size:14px;font-weight:500;background:#1a1a18;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo">ORUM</div>
    <div class="pin-sub">Rutas — Logistica</div>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-kp" id="kp"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="hdr">
    <div class="hdr-top"><h1>ORUM Rutas</h1><button class="btn-s" id="btn-rec">Recargar</button></div>
    <div class="hdr-nav">
      <button class="btn-s on" id="btn-hoy">Hoy</button>
      <button class="btn-s" id="btn-sem">Esta semana</button>
      <input type="date" id="fpicker">
    </div>
    <div class="hdr-stats" id="hstats"></div>
  </div>
  <div id="body"><div class="load">Cargando...</div></div>
</div>

<button id="fab">+</button>

<div id="modal">
  <div class="modal-box">
    <div class="modal-hdr"><h2>Anadir parada manual</h2><button class="modal-cls" id="mcls">X</button></div>
    <div class="modal-form">
      <div><label>Tipo</label><select id="m-tipo"><option value="ENTREGA">Entrega</option><option value="RECOGIDA">Recogida</option><option value="COMPRA">Compra</option><option value="TALLER">Taller</option><option value="OTRO">Otro</option></select></div>
      <div><label>Descripcion</label><input type="text" id="m-desc" placeholder="Ej: Recoger manteles sucios Marbella"></div>
      <div><label>Direccion</label><input type="text" id="m-dir" placeholder="Calle, ciudad..."></div>
      <div class="form-row"><div><label>Fecha</label><input type="date" id="m-fecha"></div></div>
      <div><label>Vehiculos</label><div id="m-vehs-checks" class="vehs-checks"></div></div>
      <div><label>Notas</label><textarea id="m-notas" placeholder="Notas..."></textarea></div>
      <button class="btn-gm" id="btn-gm">Guardar parada</button>
    </div>
  </div>
</div>

<div id="toast">OK</div>

<!-- Modal conductores por vehículo -->
<div id="modal-conductores" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:0 0 2rem;max-height:80vh;overflow-y:auto;">
    <div style="padding:14px 16px;border-bottom:.5px solid #e2e2de;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;">
      <h2 style="font-size:15px;font-weight:500;" id="modal-cond-titulo">Conductores</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="abrirModalGestionChoferes()" style="font-size:12px;color:#6b6a64;background:#f0f0ec;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;">✏️ Editar lista</button>
        <button onclick="cerrarModalConductores()" style="background:#f0f0ec;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;">✕</button>
      </div>
    </div>
    <div style="padding:14px 16px;">
      <p style="font-size:12px;color:#6b6a64;margin-bottom:10px;">Selecciona uno o varios conductores para este vehículo y vuelta:</p>
      <div id="modal-cond-checks" class="vehs-checks" style="flex-direction:column;"></div>
      <button onclick="guardarConductoresModal()" style="width:100%;padding:12px;font-size:14px;font-weight:500;background:#1a1a18;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:14px;">Guardar conductores</button>
    </div>
  </div>
</div>

<!-- Modal gestión lista de choferes -->
<div id="modal-choferes" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:380px;padding:1.5rem;margin:1rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="font-size:15px;font-weight:500;">Lista de choferes</h2>
      <button onclick="cerrarModalGestionChoferes()" style="background:#f0f0ec;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;">✕</button>
    </div>
    <div id="lista-choferes-editable" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:50vh;overflow-y:auto;"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="nuevo-chofer-input" placeholder="Nombre nuevo chofer..." style="flex:1;padding:8px 12px;font-size:13px;border:.5px solid #e2e2de;border-radius:8px;">
      <button onclick="agregarChofer()" style="padding:8px 14px;font-size:13px;background:#1a1a18;color:#fff;border:none;border-radius:8px;cursor:pointer;">Añadir</button>
    </div>
    <button onclick="guardarListaChoferes()" style="width:100%;padding:10px;font-size:13px;font-weight:500;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:12px;">Guardar lista</button>
  </div>
</div>

<script>
var PINES_CONFIG={
  '2000':{rol:'logistica'},
  '3000':{rol:'comercial'}
};
var ROL='';
var VEHS=['NISSAN','IVECO','VOLKSWAGEN','RENAULT','AZUL','FURGO NDL','FURGO NCW'];
var pin='', modo='hoy', paradas=[];
// Conductores: lista global editable y asignaciones por vehículo+vuelta+día
var CHOFERES=['Adrian Cuesta','Antonio Jimenez','Carlos Maldonado','Jesus Aguilera','Jesus Calero','Joaquin','Jorge Cuesta','Jose Enriquez','Jose Ortiz','Juan Rios','Leo Ferreyra','Leo Haro','Nourdin','Rafa Perez','Ruben Romo','Sergio Gonzalez','Wilson'];
var asignacionesConductores={}; // clave: "fecha_vehiculo_vuelta" → [nombres]

// ── PIN ──
function initKP(){
  var kp=document.getElementById('kp');
  ['1','2','3','4','5','6','7','8','9','','0','del'].forEach(function(k){
    var b=document.createElement('button');
    if(k===''){b.className='pin-k empty';}
    else if(k==='del'){b.className='pin-k';b.textContent='<<';b.addEventListener('click',pinDel);}
    else{b.className='pin-k';b.textContent=k;(function(n){b.addEventListener('click',function(){pinKey(n);});})(k);}
    kp.appendChild(b);
  });
}
function pinKey(n){if(pin.length>=4)return;pin+=n;dots(false);if(pin.length===4)pinCheck();}
function pinDel(){pin=pin.slice(0,-1);document.getElementById('pin-err').textContent='';dots(false);}
function dots(err){for(var i=0;i<4;i++){var d=document.getElementById('d'+i);d.className='pin-dot';if(err)d.classList.add('error');else if(i<pin.length)d.classList.add('filled');}}
function pinCheck(){
  var cfg=PINES_CONFIG[pin];
  if(!cfg){document.getElementById('pin-err').textContent='PIN incorrecto';dots(true);setTimeout(function(){pin='';dots(false);document.getElementById('pin-err').textContent='';},800);return;}
  ROL=cfg.rol;
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('fab').style.display='flex';
  initVehs(); setHoy(); load();
}

// ── FECHAS ──
function hoy(){return new Date().toISOString().split('T')[0];}
function semana(){var d=new Date();var dia=d.getDay()||7;var l=new Date(d);l.setDate(d.getDate()-dia+1);var dm=new Date(l);dm.setDate(l.getDate()+6);return{desde:l.toISOString().split('T')[0],hasta:dm.toISOString().split('T')[0]};}
function setHoy(){document.getElementById('fpicker').value=hoy();modo='hoy';}
function rango(){if(modo==='semana')return semana();var d=document.getElementById('fpicker').value||hoy();return{desde:d,hasta:d};}

// ── CARGA ──
function load(){
  document.getElementById('body').innerHTML='<div class="load">Cargando paradas...</div>';
  document.getElementById('hstats').textContent='';
  var r=rango();
  var urlParadas='/api/rutas?desde='+r.desde+'&hasta='+r.hasta+'&token=ORUMx2026RutasPublic&t='+Date.now();
  var urlConductores='/api/rutas/conductores?desde='+r.desde+'&hasta='+r.hasta+'&token=ORUMx2026RutasPublic&t='+Date.now();

  Promise.all([
    fetch(urlParadas).then(function(res){return res.json();}),
    fetch(urlConductores).then(function(res){return res.json();}).catch(function(){return{};})
  ]).then(function(resultados){
    var data=resultados[0];
    var dataCond=resultados[1];

    if(data.error){document.getElementById('body').innerHTML='<div class="load">Error: '+data.error+'</div>';return;}
    paradas=data.paradas||[];
    if(data.vehiculos)VEHS=data.vehiculos;

    // Cargar choferes y asignaciones
    if(dataCond.choferes&&dataCond.choferes.length>0) CHOFERES=dataCond.choferes;
    asignacionesConductores={};
    (dataCond.asignaciones||[]).forEach(function(a){
      var clave=a.fecha+'_'+a.vehiculo+'_'+a.vuelta;
      asignacionesConductores[clave]=a.conductores||[];
    });

    render();
  }).catch(function(){document.getElementById('body').innerHTML='<div class="load">Error de conexion</div>';});
}

// CAMBIO: obtener conductor específico de un vehículo concreto
// conductor puede ser: string (formato antiguo), u objeto {VOLKSWAGEN: "Luis", RENAULT: "Juan"}
function getConductorDeVeh(p, veh){
  if(!p.conductor)return'';
  if(typeof p.conductor==='string'){
    // formato antiguo: un solo conductor para todos
    return p.conductor;
  }
  if(typeof p.conductor==='object'){
    return p.conductor[veh]||'';
  }
  return'';
}

// Obtener todos los conductores de una parada como texto legible
function getConductoresTexto(p){
  if(!p.conductor)return'';
  if(typeof p.conductor==='string')return p.conductor;
  if(typeof p.conductor==='object'){
    return Object.values(p.conductor).filter(Boolean).filter(function(v,i,a){return a.indexOf(v)===i;}).join(' / ');
  }
  return'';
}

// ── CAMBIO 2: Obtener lista de vehículos asignados a una parada (puede ser string o array) ──
function getVehsParada(p){
  if(!p.vehiculo)return[];
  if(typeof p.vehiculo==='string'){
    // Limpiar el formato Java corrupto si llega
    if(p.vehiculo.indexOf('[Ljava')===0||p.vehiculo.indexOf('[L')===0)return[];
    return p.vehiculo.split(',').map(function(v){return v.trim();}).filter(Boolean);
  }
  if(Array.isArray(p.vehiculo))return p.vehiculo.filter(Boolean);
  return[];
}

// Convierte array de vehículos a string separado por comas (Apps Script lo guarda correctamente así)
function vehsAString(vehs){
  if(!vehs||vehs.length===0)return'';
  if(Array.isArray(vehs))return vehs.filter(Boolean).join(',');
  return String(vehs);
}

// ── RENDER ──
function render(){
  var conVeh=paradas.filter(function(p){return getVehsParada(p).length>0;}).length;
  document.getElementById('hstats').textContent=paradas.length+' paradas - '+conVeh+' asignadas';

  var SIN='__sin__';
  var grupos={};

  paradas.forEach(function(p,i){
    var vehs=getVehsParada(p);
    if(vehs.length===0){
      if(!grupos[SIN])grupos[SIN]={veh:SIN,vuelta:1,gkey:SIN,items:[]};
      grupos[SIN].items.push(i);
    } else {
      vehs.forEach(function(v){
        var vuelta=parseInt(p.vuelta)||1;
        var gkey=v+'_v'+vuelta;
        if(!grupos[gkey])grupos[gkey]={veh:v,vuelta:vuelta,gkey:gkey,items:[]};
        grupos[gkey].items.push(i);
      });
    }
  });

  // Ordenar items dentro de cada grupo por campo orden
  Object.keys(grupos).forEach(function(gk){
    grupos[gk].items.sort(function(a,b){
      var oa=paradas[a].orden||0, ob=paradas[b].orden||0;
      if(oa!==ob)return oa-ob;
      return (paradas[a].fecha||'').localeCompare(paradas[b].fecha||'');
    });
  });

  // OPCIÓN C: detectar paradas compartidas (varios vehículos)
  var idsCompartidos=new Set();
  paradas.forEach(function(p){if(getVehsParada(p).length>1)idsCompartidos.add(p.clave||p.numero);});

  var esSemana=(modo==='semana');
  var html='';

  var renderDia=function(fecha,gruposDia){
    // 1. Sección COMPARTIDOS (proyectos en varios vehículos)
    var itemsCompartidos=[];
    Object.keys(gruposDia).filter(function(gk){return gk!==SIN;}).forEach(function(gk){
      gruposDia[gk].items.forEach(function(i){
        if(getVehsParada(paradas[i]).length>1){
          var yaEsta=itemsCompartidos.indexOf(i)!==-1;
          if(!yaEsta)itemsCompartidos.push(i);
        }
      });
    });
    if(itemsCompartidos.length>0){
      html+='<div class="grupo" data-gkey="__compartidos__">';
      var vehsEnCompartidos=[];
      itemsCompartidos.forEach(function(i){
        getVehsParada(paradas[i]).forEach(function(v){
          if(vehsEnCompartidos.indexOf(v)===-1)vehsEnCompartidos.push(v);
        });
      });
      var tituloCompartidos=vehsEnCompartidos.sort().join(' · ');
      var fechaComp=document.getElementById('fpicker').value||hoy();
      // Conductor de cada vehículo compartido
      var conductoresComp=[];
      vehsEnCompartidos.sort().forEach(function(v){
        var clave=fechaComp+'_'+v+'_1';
        var conds=asignacionesConductores[clave]||[];
        if(conds.length>0)conductoresComp=conductoresComp.concat(conds);
      });
      conductoresComp=conductoresComp.filter(function(c,i,a){return a.indexOf(c)===i;}); // únicos
      html+='<div class="grupo-hdr" style="background:#7A5C00;position:relative;">';
      html+='<div class="grupo-hdr-left"><span>🔄 '+tituloCompartidos+'</span></div>';
      if(conductoresComp.length>0) html+='<span class="grupo-conductor">'+conductoresComp.join(' · ')+'</span>';
      html+='<div class="grupo-hdr-right">';
      if(ROL==='logistica'){
        // Un botón de conductores por vehículo compartido
        vehsEnCompartidos.sort().forEach(function(v){
          var gkeyComp=v+'_v1';
          html+='<button class="btn-wa btn-asignar-cond" onclick="abrirModalConductores(\''+gkeyComp+'\',\''+fechaComp+'\')" title="Conductores '+v+'">&#128100; '+v+'</button>';
        });
      }
      html+='</div></div>';
      html+='<table class="tbl"><colgroup><col><col><col><col><col><col><col><col><col><col></colgroup><thead><tr><th></th><th>Tipo</th><th>Fecha</th><th>Nº</th><th>Cliente</th><th>Ubicacion</th><th>Estado</th><th>Vehiculo(s)</th><th>Notas</th><th></th></tr></thead><tbody>';
      itemsCompartidos.forEach(function(idx){html+=renderFila(idx,'__compartidos__');});
      html+='</tbody></table></div>';
    }

    // 2. Grupos de vehículos — excluir compartidos, solo mostrar los que tienen paradas
    var idsCompartidosSet=new Set(itemsCompartidos);
    var claves=Object.keys(gruposDia).filter(function(gk){return gk!==SIN;}).sort();
    claves.forEach(function(gk){
      var grupoFiltrado={
        veh:gruposDia[gk].veh,
        vuelta:gruposDia[gk].vuelta,
        gkey:gruposDia[gk].gkey,
        items:gruposDia[gk].items.filter(function(i){return !idsCompartidosSet.has(i);})
      };
      if(grupoFiltrado.items.length>0) html+=renderGrupo(grupoFiltrado);
    });

    // 3. Sin vehículo asignado al final
    var gSin=gruposDia[SIN];
    if(gSin&&gSin.items.length>0)html+=renderGrupo(gSin);
  };

  if(esSemana){
    var dias={};
    paradas.forEach(function(p){if(p.fecha)dias[p.fecha]=1;});
    var diasArr=Object.keys(dias).sort();
    diasArr.forEach(function(fecha){
      html+='<div class="dia-sep">'+formatDiaLargo(fecha)+'</div>';
      var gruposDia={};
      Object.keys(grupos).forEach(function(gk){
        var itemsDia=grupos[gk].items.filter(function(i){return paradas[i].fecha===fecha;});
        if(itemsDia.length>0||gk===SIN){
          gruposDia[gk]={veh:grupos[gk].veh,vuelta:grupos[gk].vuelta,gkey:gk,items:itemsDia};
        }
      });
      renderDia(fecha,gruposDia);
    });
  } else {
    var gruposDia={};
    Object.keys(grupos).forEach(function(gk){
      gruposDia[gk]={veh:grupos[gk].veh,vuelta:grupos[gk].vuelta,gkey:grupos[gk].gkey,items:grupos[gk].items.slice()};
    });
    renderDia('hoy',gruposDia);
  }

  if(!html)html='<div class="load">No hay paradas en este periodo</div>';
  document.getElementById('body').innerHTML=html;
  bindEvents();
}

function renderGrupo(g){
  var SIN='__sin__';
  var esSin=g.veh===SIN;
  var titulo=esSin?'Sin vehiculo asignado':(g.veh+(g.vuelta>1?' — '+g.vuelta+'ª vuelta':''));

  // Obtener conductores asignados a este vehículo+vuelta para las fechas de las paradas
  var fechasGrupo={};
  g.items.forEach(function(i){if(paradas[i].fecha)fechasGrupo[paradas[i].fecha]=1;});
  var fechasPrincipales=Object.keys(fechasGrupo).sort();
  // Si el grupo está vacío, usar la fecha del selector para poder asignar conductores igualmente
  var fechaPrincipal=fechasPrincipales[0]||(document.getElementById('fpicker').value||hoy());
  var condsClave=fechaPrincipal+'_'+g.veh+'_'+g.vuelta;
  var conductoresAsignados=asignacionesConductores[condsClave]||[];
  var conductorTexto=conductoresAsignados.join(' · ')||'';

  var html='<div class="grupo" data-gkey="'+g.gkey+'">';
  html+='<div class="grupo-hdr'+(esSin?' sin':'')+'">';
  html+='<div class="grupo-hdr-left"><span>'+titulo+'</span></div>';
  if(conductorTexto) html+='<span class="grupo-conductor">'+conductorTexto+'</span>';
  html+='<div class="grupo-hdr-right">';
  if(ROL==='logistica'&&!esSin){
    html+='<button class="btn-wa btn-asignar-cond" onclick="abrirModalConductores(\''+g.gkey+'\',\''+fechaPrincipal+'\')" title="Asignar conductores">&#128100; Conductores</button>';
  }
  if(!esSin)html+='<button class="btn-wa" onclick="enviarWhatsApp(\''+g.gkey+'\')" title="Enviar ruta por WhatsApp">&#128228; WhatsApp</button>';
  html+='</div></div>';
  html+='<table class="tbl"><colgroup><col><col><col><col><col><col><col><col><col><col></colgroup><thead><tr><th></th><th>Tipo</th><th>Fecha</th><th>Nº</th><th>Cliente</th><th>Ubicacion</th><th>Estado</th><th>Vehiculo(s)</th><th>Notas</th><th></th></tr></thead><tbody>';
  g.items.forEach(function(idx){html+=renderFila(idx,g.gkey);});
  html+='</tbody></table></div>';
  return html;
}

function renderFila(idx,gkey){
  var p=paradas[idx];
  var key='p'+idx+'_'+gkey.replace(/[^a-zA-Z0-9]/g,'');
  var tipo=(p.tipo||'OTRO').toLowerCase();
  var bc=p.es_manual?'b-manual':('b-'+tipo);
  var bt=p.es_manual?'MANUAL':p.tipo;
  var esOk=['returned','cargado','marbella','on location','controlado','preparado'].some(function(x){return(p.estado||'').toLowerCase().indexOf(x)!==-1;});
  var estH=p.estado?('<span class="be '+(esOk?'be-ok':'be-cf')+'">'+p.estado+'</span>'):'';
  var mapsH=p.google_maps_url?('<a href="'+p.google_maps_url+'" target="_blank" class="a-maps">Maps</a>'):'';
  // CAMBIO 6: solo fecha, sin hora
  var fechaH=p.fecha?formatFechaCorta(p.fecha):'';
  // CAMBIO 4: número de proyecto
  var numH=p.numero?('<span class="num-proy" onclick="copiarNum(this,\''+p.numero+'\')" title="Clic para copiar">#'+p.numero+'</span>'):'<span style="color:#ccc">—</span>';
  // CAMBIO 2: mostrar vehículos asignados (puede ser múltiple)
  var vehsActuales=getVehsParada(p);
  var vehTexto=vehsActuales.length>0?vehsActuales.join(', '):'<span style="color:#ccc">—</span>';
  // En logística, inline sigue siendo simple (el detalle tiene los checkboxes)
  var vehCelda=ROL==='logistica'?vehTexto:vehTexto;

  var pEnc=encodeURIComponent(JSON.stringify({idx:idx,clave:p.clave,es_manual:p.es_manual,id_manual:p.id_manual||'',gkey:gkey}));
  var esCompartida = vehsActuales.length > 1;
  var tipoClase = p.es_manual ? 'tipo-manual' : ('tipo-'+tipo);
  var dragAttr=ROL==='logistica'?' draggable="true"':'';

  var html='<tr class="fila '+tipoClase+(esCompartida?' compartida':'')+'" data-idx="'+idx+'" data-gkey="'+gkey+'"'+dragAttr+'>';
  html+='<td class="td-drag">'+(ROL==='logistica'?'⠿':'')+'</td>';
  html+='<td class="td-tipo"><span class="badge '+bc+'">'+bt+'</span></td>';
  html+='<td class="td-fecha">'+fechaH+'</td>';
  // CAMBIO 4: columna número independiente
  html+='<td class="td-num">'+numH+'</td>';
  html+='<td class="td-cli"><div class="cli-nom">'+(p.cliente||'—')+'</div></td>';
  html+='<td class="td-loc">'+(p.localizacion||'—')+mapsH+'</td>';
  html+='<td class="td-est">'+estH+'</td>';
  html+='<td class="td-veh">'+vehCelda+'</td>';
  html+='<td class="td-notas">'+(p.notas||'')+'</td>';
  html+='<td class="td-exp">▾</td>';
  html+='</tr>';

  // Fila detalle expandible
  html+='<tr class="fila-det" id="det-'+key+'"><td colspan="10">';
  html+='<div class="det-grid">';
  if(ROL==='logistica'){
    html+='<div class="det-campo" style="grid-column:1/-1"><label>Vehiculos asignados</label><div class="vehs-checks" id="vch-'+key+'">';
    VEHS.forEach(function(v){
      var chk=vehsActuales.indexOf(v)!==-1?' checked':'';
      var sel=vehsActuales.indexOf(v)!==-1?' seleccionado':'';
      html+='<label class="veh-check-lbl'+sel+'" id="lbl-'+key+'-'+v.replace(/[^a-zA-Z0-9]/g,'')+'"><input type="checkbox" value="'+v+'"'+chk+' onchange="toggleVehCheck(this,\''+key+'\')"> '+v+'</label>';
    });
    html+='</div></div>';
    html+='<div class="det-campo"><label>Vuelta</label><select id="vuel-'+key+'" class="vuelta-sel">';
    for(var vv=1;vv<=4;vv++)html+='<option value="'+vv+'"'+((parseInt(p.vuelta)||1)===vv?' selected':'')+'>'+vv+'ª</option>';
    html+='</select></div>';
  }
  html+='<div class="det-campo"><label>Notas</label><textarea id="dn-'+key+'" placeholder="Notas...">'+(p.notas||'')+'</textarea></div>';
  html+='</div><div class="det-acts">';
  html+='<button class="btn-g btn-save" data-key="'+key+'" data-p="'+pEnc+'">Guardar</button>';
  if(p.es_manual)html+='<button class="btn-g del btn-del" data-id="'+p.id_manual+'">Eliminar</button>';
  html+='<span class="msg-ok" id="msg-'+key+'"></span>';
  html+='</div></td></tr>';
  return html;
}

// CAMBIO 2: actualizar estilo del label y añadir/quitar campo conductor al marcar/desmarcar
function toggleVehCheck(chk, key){
  var lbl=chk.closest('.veh-check-lbl');
  var veh=chk.value;
  var vehId=veh.replace(/[^a-zA-Z0-9]/g,'');
  if(chk.checked){
    lbl.classList.add('seleccionado');
    // Añadir campo conductor para este vehículo
    var cont=document.getElementById('conductores-'+key);
    if(cont&&!document.getElementById('cond-row-'+key+'-'+vehId)){
      var div=document.createElement('div');
      div.style.cssText='display:flex;align-items:center;gap:8px;';
      div.id='cond-row-'+key+'-'+vehId;
      div.innerHTML='<span style="font-size:12px;color:#6b6a64;min-width:110px;">'+veh+'</span><input type="text" class="cond-veh-input" data-veh="'+veh+'" id="dc-'+key+'-'+vehId+'" placeholder="Conductor..." style="flex:1;padding:6px 9px;font-size:13px;border:.5px solid #e2e2de;border-radius:7px;">';
      cont.appendChild(div);
    }
  } else {
    lbl.classList.remove('seleccionado');
    // Quitar campo conductor de este vehículo
    var row=document.getElementById('cond-row-'+key+'-'+vehId);
    if(row)row.remove();
  }
}

function formatFechaCorta(iso){
  if(!iso)return'';
  var dias=['dom','lun','mar','mie','jue','vie','sab'];
  var d=new Date(iso+'T12:00:00');
  return dias[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1);
}
function formatDiaLargo(iso){
  if(!iso)return'';
  var dias=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var d=new Date(iso+'T12:00:00');
  return dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()];
}

// CAMBIO 4: copiar número al portapapeles con feedback visual
function copiarNum(el,num){
  navigator.clipboard.writeText(String(num)).then(function(){
    var orig=el.textContent;
    el.textContent='✓ Copiado';
    el.classList.add('copiado');
    setTimeout(function(){el.textContent=orig;el.classList.remove('copiado');},1200);
  });
}

// ── EVENTOS ──
function bindEvents(){
  // ── AUTO-SCROLL durante drag ──
  // Cuando el cursor se acerca al borde superior/inferior de la ventana
  // mientras se arrastra, la página se desplaza automáticamente.
  var autoScrollRAF=null;
  var autoScrollSpeed=0;
  var SCROLL_ZONE=80; // px desde el borde donde empieza el scroll
  var SCROLL_MAX=18;  // px por frame máximo

  function autoScrollLoop(){
    if(autoScrollSpeed!==0){
      window.scrollBy(0,autoScrollSpeed);
      autoScrollRAF=requestAnimationFrame(autoScrollLoop);
    }
  }

  document.addEventListener('dragover',function(e){
    var y=e.clientY;
    var h=window.innerHeight;
    if(y<SCROLL_ZONE){
      autoScrollSpeed=-Math.round(SCROLL_MAX*(1-(y/SCROLL_ZONE)));
    } else if(y>h-SCROLL_ZONE){
      autoScrollSpeed=Math.round(SCROLL_MAX*(1-((h-y)/SCROLL_ZONE)));
    } else {
      autoScrollSpeed=0;
    }
    if(autoScrollSpeed!==0&&!autoScrollRAF){
      autoScrollRAF=requestAnimationFrame(autoScrollLoop);
    } else if(autoScrollSpeed===0&&autoScrollRAF){
      cancelAnimationFrame(autoScrollRAF);
      autoScrollRAF=null;
    }
  });

  document.addEventListener('dragend',function(){
    autoScrollSpeed=0;
    if(autoScrollRAF){cancelAnimationFrame(autoScrollRAF);autoScrollRAF=null;}
  });

  // Expand fila
  document.querySelectorAll('.fila').forEach(function(fila){
    fila.addEventListener('click',function(e){
      if(e.target.closest('.btn-save')||e.target.closest('.btn-del')||e.target.closest('.a-maps')||e.target.closest('input')||e.target.closest('textarea')||e.target.closest('.num-proy'))return;
      var idx=fila.getAttribute('data-idx');
      var gkey=(fila.getAttribute('data-gkey')||'').replace(/[^a-zA-Z0-9]/g,'');
      var det=document.getElementById('det-p'+idx+'_'+gkey);
      if(det){det.classList.toggle('open');fila.classList.toggle('exp');}
    });
  });

  // Guardar detalle
  document.querySelectorAll('.btn-save').forEach(function(btn){
    btn.addEventListener('click',function(){guardarDetalle(btn);});
  });

  // Eliminar manual
  document.querySelectorAll('.btn-del').forEach(function(btn){
    btn.addEventListener('click',function(){eliminarManual(btn.getAttribute('data-id'));});
  });

  // ── CAMBIO 3: Drag & drop entre grupos ──
  var dragSrcIdx=null, dragSrcGkey=null;

  document.querySelectorAll('.fila[draggable=true]').forEach(function(fila){
    fila.addEventListener('dragstart',function(e){
      dragSrcIdx=parseInt(fila.getAttribute('data-idx'));
      dragSrcGkey=fila.getAttribute('data-gkey');
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){fila.style.opacity='0.4';},0);
    });
    fila.addEventListener('dragend',function(){
      fila.style.opacity='';
      document.querySelectorAll('.fila').forEach(function(f){
        f.classList.remove('drag-over-top','drag-over-bottom');
      });
      document.querySelectorAll('.grupo-drop-zone').forEach(function(z){
        z.classList.remove('drag-over-zone');
      });
    });
    fila.addEventListener('dragover',function(e){
      e.preventDefault();
      document.querySelectorAll('.fila').forEach(function(f){f.classList.remove('drag-over-top','drag-over-bottom');});
      var rect=fila.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2) fila.classList.add('drag-over-top');
      else fila.classList.add('drag-over-bottom');
    });
    fila.addEventListener('dragleave',function(){
      fila.classList.remove('drag-over-top','drag-over-bottom');
    });
    fila.addEventListener('drop',function(e){
      e.preventDefault();
      fila.classList.remove('drag-over-top','drag-over-bottom');
      var destIdx=parseInt(fila.getAttribute('data-idx'));
      var destGkey=fila.getAttribute('data-gkey');
      if(dragSrcIdx===null||dragSrcIdx===destIdx)return;
      var rect=fila.getBoundingClientRect();
      var insertarAntes=(e.clientY<rect.top+rect.height/2);
      moverEnGrupo(dragSrcIdx,destIdx,dragSrcGkey,destGkey,insertarAntes);
    });
  });

  // Zonas de drop en encabezados de grupo (para soltar en grupo vacío o cambiar de grupo)
  document.querySelectorAll('.grupo-hdr').forEach(function(hdr){
    hdr.addEventListener('dragover',function(e){
      e.preventDefault();
      hdr.style.outline='2px solid #1D9E75';
    });
    hdr.addEventListener('dragleave',function(){
      hdr.style.outline='';
    });
    hdr.addEventListener('drop',function(e){
      e.preventDefault();
      hdr.style.outline='';
      if(dragSrcIdx===null)return;
      var destGkey=hdr.closest('.grupo').getAttribute('data-gkey');
      // Soltar en el encabezado = añadir al final de ese grupo
      var itemsGrupo=[];
      document.querySelectorAll('.fila[data-gkey="'+destGkey+'"]').forEach(function(f){
        itemsGrupo.push(parseInt(f.getAttribute('data-idx')));
      });
      if(itemsGrupo.length===0){
        // Grupo vacío: mover directamente
        moverAGrupo(dragSrcIdx, dragSrcGkey, destGkey, -1, false);
      } else {
        var ultimoIdx=itemsGrupo[itemsGrupo.length-1];
        moverEnGrupo(dragSrcIdx,ultimoIdx,dragSrcGkey,destGkey,false);
      }
    });
  });
}

// CAMBIO 3: mover parada a un grupo distinto (cambia vehículo asignado)
function moverAGrupo(srcIdx, srcGkey, destGkey, destIdx, insertarAntes) {
  var SIN='__sin__';
  var p=paradas[srcIdx];

  if(destGkey===SIN){
    // Quitar todos los vehículos → pasar a sin vehículo
    p.vehiculo=[];
    p.vuelta=1;
  } else {
    var partes=destGkey.split('_v');
    var vehDestino=partes[0];
    var vueltaDestino=parseInt(partes[1])||1;
    // Si ya tenía vehículos, añadir el nuevo (multi-vehículo)
    // Si se arrastra desde SIN o desde un grupo concreto solo, reemplazar
    if(srcGkey===SIN){
      p.vehiculo=[vehDestino];
    } else {
      // Añadir el vehículo destino si no lo tiene ya
      var vehsActuales=getVehsParada(p);
      if(vehsActuales.indexOf(vehDestino)===-1) vehsActuales.push(vehDestino);
      p.vehiculo=vehsActuales;
    }
    p.vuelta=vueltaDestino;
  }

  render();
  // Guardar en backend — siempre como string, nunca como array
  apiPost({action:'set_asignacion',clave:p.clave,proyecto_id:p.proyecto_id,tipo:p.tipo,fecha:p.fecha,vehiculo:vehsAString(p.vehiculo),conductor:p.conductor||{},notas:p.notas||'',vuelta:p.vuelta||1,orden:p.orden||0})
    .then(function(){toast('Movido');})
    .catch(function(){toast('Error al guardar movimiento');});
}

// CAMBIO 1: función de movimiento corregida — inserción en posición exacta
function moverEnGrupo(srcIdx,destIdx,srcGkey,destGkey,insertarAntes){
  var SIN='__sin__';

  // Si cambia de grupo, REEMPLAZAR vehículo (no añadir — para multi-vehículo usar el detalle)
  if(srcGkey!==destGkey){
    if(destGkey===SIN){
      paradas[srcIdx].vehiculo=[];
      paradas[srcIdx].vuelta=1;
    } else {
      var partes=destGkey.split('_v');
      var vehDestino=partes[0];
      var vueltaDestino=parseInt(partes[1])||1;
      paradas[srcIdx].vehiculo=[vehDestino];
      paradas[srcIdx].vuelta=vueltaDestino;
    }
  }

  // Obtener grupo destino (puede ser el mismo o diferente)
  var gkeyFinal=destGkey!==SIN?destGkey:(paradas[srcIdx].vehiculo?((getVehsParada(paradas[srcIdx])[0]||'')+'_v'+(parseInt(paradas[srcIdx].vuelta)||1)):SIN);

  // Construir array del grupo destino excluyendo el srcIdx
  var arr=[];
  paradas.forEach(function(p,i){
    if(i===srcIdx)return;
    var vehs=getVehsParada(p);
    var vu=parseInt(p.vuelta)||1;
    var enGrupo=false;
    if(gkeyFinal===SIN&&vehs.length===0)enGrupo=true;
    else vehs.forEach(function(v){if((v+'_v'+vu)===gkeyFinal)enGrupo=true;});
    if(enGrupo)arr.push(i);
  });

  // Ordenar por orden actual
  arr.sort(function(a,b){return(paradas[a].orden||0)-(paradas[b].orden||0);});

  // Encontrar posición de destino e insertar en el lugar correcto
  var posDestino=arr.indexOf(destIdx);
  if(posDestino===-1){
    arr.push(srcIdx);
  } else {
    if(insertarAntes){arr.splice(posDestino,0,srcIdx);}
    else{arr.splice(posDestino+1,0,srcIdx);}
  }

  guardarGrupoBackground(arr);
}

function getGrupos(){
  var SIN='__sin__'; var g={};
  paradas.forEach(function(p,i){
    var vehs=getVehsParada(p);
    if(vehs.length===0){if(!g[SIN])g[SIN]=[];g[SIN].push(i);}
    else{vehs.forEach(function(v){var vu=parseInt(p.vuelta)||1;var gk=v+'_v'+vu;if(!g[gk])g[gk]=[];g[gk].push(i);});}
  });
  return g;
}

function guardarGrupoBackground(arr){
  arr.forEach(function(i,pos){paradas[i].orden=pos;});
  render();
  var saves=arr.map(function(i,pos){
    return apiPost({action:'set_asignacion',clave:paradas[i].clave,proyecto_id:paradas[i].proyecto_id,tipo:paradas[i].tipo,fecha:paradas[i].fecha,vehiculo:vehsAString(paradas[i].vehiculo),conductor:paradas[i].conductor||{},notas:paradas[i].notas||'',vuelta:paradas[i].vuelta||1,orden:pos});
  });
  Promise.all(saves).catch(function(){toast('Error guardando — recarga para verificar');});
}

function guardarDetalle(btn){
  var key=btn.getAttribute('data-key');
  var pRaw=btn.getAttribute('data-p');
  var pData; try{pData=JSON.parse(decodeURIComponent(pRaw));}catch(e){return;}
  var idx=pData.idx;

  // Recoger vehículos seleccionados
  var vehsSeleccionados=[];
  var container=document.getElementById('vch-'+key);
  if(container){
    container.querySelectorAll('input[type=checkbox]:checked').forEach(function(chk){vehsSeleccionados.push(chk.value);});
  } else {
    vehsSeleccionados=getVehsParada(paradas[idx]);
  }

  var elVuel=document.getElementById('vuel-'+key);
  var notas=document.getElementById('dn-'+key).value;
  var vuelta=elVuel?(parseInt(elVuel.value)||1):(parseInt(paradas[idx].vuelta)||1);
  // Conductor se gestiona por vehículo desde el modal de conductores, no desde aquí
  var conductor=paradas[idx].conductor||{};

  btn.textContent='...'; btn.disabled=true;

  // Siempre enviar vehículo como string separado por comas (evita [Ljava.lang.Object])
  var body={action:'set_asignacion',clave:pData.clave,proyecto_id:paradas[idx].proyecto_id,tipo:paradas[idx].tipo,fecha:paradas[idx].fecha,vehiculo:vehsAString(vehsSeleccionados),conductor:conductor,notas:notas,vuelta:vuelta,orden:paradas[idx].orden||0};
  if(pData.es_manual){body.action='update_manual';body.id=pData.id_manual;}

  apiPost(body).then(function(){
    paradas[idx].vehiculo=vehsSeleccionados;
    paradas[idx].conductor=conductor;
    paradas[idx].notas=notas;
    paradas[idx].vuelta=vuelta;
    btn.textContent='Guardado';btn.classList.add('ok');
    var msg=document.getElementById('msg-'+key);if(msg)msg.textContent='Guardado';
    toast('Guardado');
    setTimeout(function(){btn.textContent='Guardar';btn.classList.remove('ok');btn.disabled=false;if(msg)msg.textContent='';render();},1200);
  }).catch(function(){btn.textContent='Error';btn.disabled=false;});
}

function eliminarManual(id){
  if(!confirm('Eliminar esta parada?'))return;
  apiPost({action:'del_manual',id:id}).then(function(){toast('Parada eliminada');load();});
}

function enviarWhatsApp(gkey){
  var SIN='__sin__';
  var grupos=getGrupos();
  var grpArr=(grupos[gkey]||[]).slice();
  if(!grpArr.length){toast('Sin paradas en este grupo');return;}

  var partes=gkey.split('_v');
  var nombreVeh=partes[0];
  var vuelta=parseInt(partes[1])||1;

  // Filtrar solo las paradas del día actualmente visible
  // En modo "hoy" = fecha del picker; en modo "semana" = todas las fechas del grupo
  var fechaFiltro = modo==='hoy' ? (document.getElementById('fpicker').value||hoy()) : null;
  if(fechaFiltro){
    grpArr=grpArr.filter(function(i){return paradas[i].fecha===fechaFiltro;});
  }
  // Excluir paradas compartidas (varios vehículos) — ya están en su sección propia
  grpArr=grpArr.filter(function(i){return getVehsParada(paradas[i]).length===1;});

  grpArr.sort(function(a,b){return(paradas[a].orden||0)-(paradas[b].orden||0);});

  if(!grpArr.length){toast('Sin paradas en este grupo para hoy');return;}

  var fechas={};
  grpArr.forEach(function(i){if(paradas[i].fecha)fechas[paradas[i].fecha]=1;});
  var fechasArr=Object.keys(fechas).sort();
  var fechaLabel=fechasArr.map(function(f){return formatDiaLargo(f);}).join(', ');

  // Añadir conductor si está asignado
  var condsClave=(fechasArr[0]||'')+'_'+nombreVeh+'_'+vuelta;
  var conductores=asignacionesConductores[condsClave]||[];
  var condStr=conductores.length>0?('\nConductor: '+conductores.join(', ')):'';

  var titulo='RUTA '+nombreVeh+(vuelta>1?' ('+vuelta+'ª vuelta)':'');
  var texto=titulo+' - '+fechaLabel+condStr+'\n\n';
  grpArr.forEach(function(i,pos){
    var p=paradas[i];
    texto+=(pos+1)+'. '+p.tipo+'\n';
    if(p.numero)texto+='   #'+p.numero+'\n';
    texto+='   '+(p.cliente||'')+'\n';
    if(p.localizacion)texto+='   '+p.localizacion+'\n';
    if(p.notas)texto+='   Notas: '+p.notas+'\n';
    texto+='\n';
  });
  window.open('https://wa.me/?text='+encodeURIComponent(texto),'_blank');
}
