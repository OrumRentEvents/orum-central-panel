<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORUM Central</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffffff;
    color: #1a1a18;
  }

  /* ── PANTALLA DE LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f7f6f2;
  }
  .login-box {
    background: #ffffff;
    border: 0.5px solid #e2e2de;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 360px;
  }
  .login-box h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .login-box p.subtitle {
    font-size: 13px;
    color: #6b6a64;
    margin-bottom: 1.5rem;
  }
  .login-box label {
    display: block;
    font-size: 12px;
    color: #6b6a64;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  .login-box input {
    width: 100%;
    padding: 9px 12px;
    font-size: 14px;
    border: 0.5px solid #e2e2de;
    border-radius: 8px;
    background: #fff;
    color: #1a1a18;
  }
  .login-box input:focus {
    outline: none;
    border-color: #378ADD;
  }
  .login-box button {
    width: 100%;
    margin-top: 1.5rem;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    background: #1a1a18;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .login-box button:hover { background: #333; }
  .login-error {
    color: #A32D2D;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* ── APP PRINCIPAL ── */
  #app-screen { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    background: #f7f6f2;
    border-right: 0.5px solid #e2e2de;
    padding: 1.25rem 0;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 0 1.25rem 1rem;
    border-bottom: 0.5px solid #e2e2de;
    margin-bottom: 0.5rem;
  }
  .sidebar-header .org-name { font-weight: 500; font-size: 15px; }
  .sidebar-header .user-name { font-size: 12px; color: #6b6a64; margin-top: 2px; }

  .nav-group-title {
    padding: 1rem 1.25rem 0.25rem;
    font-size: 11px;
    color: #9a988f;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 1.25rem;
    font-size: 13px;
    color: #4a4944;
    cursor: pointer;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { background: #efeee9; }
  .nav-item.active {
    background: #e6f1fb;
    border-left-color: #378ADD;
    color: #0C447C;
    font-weight: 500;
  }

  .logout-button {
    margin: 1.5rem 1.25rem 0;
    padding: 8px 12px;
    font-size: 13px;
    border: 0.5px solid #e2e2de;
    border-radius: 8px;
    background: #fff;
    color: #4a4944;
    cursor: pointer;
    width: calc(100% - 2.5rem);
  }

  .main-content {
    flex: 1;
    padding: 1.5rem 1.75rem;
    min-width: 0;
  }
  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .main-header h1 { font-size: 22px; font-weight: 500; }
  .last-update {
    font-size: 12px;
    color: #6b6a64;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .last-update .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #27500A;
    flex-shrink: 0;
  }
  .last-update.stale .dot { background: #854F0B; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 4px; color: #6b6a64; font-weight: 400; border-bottom: 0.5px solid #e2e2de; }
  td { padding: 9px 4px; border-bottom: 0.5px solid #e2e2de; }

  .badge {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 8px;
    display: inline-block;
  }
  .badge-success { background: #EAF3DE; color: #27500A; }
  .badge-warning { background: #FAEEDA; color: #854F0B; }
  .badge-danger { background: #FCEBEB; color: #A32D2D; }
  .badge-neutral { background: #f0efe9; color: #6b6a64; }

  .search-box { position: relative; }
  .search-box input {
    width: 220px;
    padding: 6px 12px 6px 32px;
    font-size: 13px;
    border: 0.5px solid #e2e2de;
    border-radius: 8px;
    background: #fff;
    color: #1a1a18;
  }
  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    opacity: 0.5;
  }

  .loading-text { color: #9a988f; font-size: 13px; padding: 2rem 0; }
</style>
</head>
<body>

<!-- ============ PANTALLA DE LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <h1>ORUM Central</h1>
    <p class="subtitle">Accede con tu usuario y contraseña</p>
    <form id="login-form">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" autocomplete="username" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" required>

      <p class="login-error" id="login-error"></p>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<!-- ============ APP PRINCIPAL ============ -->
<div id="app-screen">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="org-name">ORUM Central</div>
        <div class="user-name" id="sidebar-user-name"></div>
      </div>
      <div id="nav-container"></div>
      <button class="logout-button" id="logout-btn">Cerrar sesión</button>
    </div>

    <div class="main-content">
      <div class="main-header">
        <h1 id="content-title">Proyectos</h1>
        <div class="last-update" id="last-update-indicator">
          <span class="dot"></span>
          <span id="last-update-text">Cargando...</span>
        </div>
      </div>
      <div id="content-body">
        <p class="loading-text">Cargando datos...</p>
      </div>
    </div>
  </div>
</div>

<script>
let usuarioActual = null;

// ── LOGIN ──
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, password })
    });
    const data = await resp.json();

    if (!resp.ok) {
      errorEl.textContent = data.error || 'Error al iniciar sesión';
      errorEl.style.display = 'block';
      return;
    }

    usuarioActual = data.usuario;
    mostrarApp();
  } catch (err) {
    errorEl.textContent = 'Error de conexión con el servidor';
    errorEl.style.display = 'block';
  }
});

// ── LOGOUT ──
document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
});

// ── Comprobar si ya hay sesión activa al cargar la página ──
async function comprobarSesion() {
  try {
    const resp = await fetch('/api/sesion');
    if (resp.ok) {
      const data = await resp.json();
      usuarioActual = data.usuario;
      mostrarApp();
    }
  } catch (err) {
    // sin sesión, se queda en login
  }
}

function mostrarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('sidebar-user-name').textContent = usuarioActual.nombre;
  construirMenu();
  cargarProyectos();
}

// ── MENÚ DINÁMICO SEGÚN ROL ──
function construirMenu() {
  const nav = document.getElementById('nav-container');
  nav.innerHTML = '';

  // Por ahora, todos los roles ven al menos "Proyectos" — iremos añadiendo módulos por rol
  const grupoTitle = document.createElement('div');
  grupoTitle.className = 'nav-group-title';
  grupoTitle.textContent = usuarioActual.rol;
  nav.appendChild(grupoTitle);

  const itemProyectos = document.createElement('div');
  itemProyectos.className = 'nav-item active';
  itemProyectos.textContent = '📁 Proyectos';
  itemProyectos.onclick = cargarProyectos;
  nav.appendChild(itemProyectos);

  const itemFinanciero = document.createElement('div');
  itemFinanciero.className = 'nav-item';
  itemFinanciero.textContent = '💶 Financiero';
  itemFinanciero.onclick = cargarFinanciero;
  nav.appendChild(itemFinanciero);
}

let financieroDataGlobal = null;
let pestanaFinancieroActiva = 'proyectos';

// ── CARGAR FINANCIERO ──
async function cargarFinanciero() {
  document.getElementById('content-title').textContent = 'Financiero';
  const body = document.getElementById('content-body');
  body.innerHTML = '<p class="loading-text">Cruzando datos...</p>';

  try {
    const resp = await fetch('/api/financiero');
    const data = await resp.json();

    if (data.error) {
      body.innerHTML = '<p class="loading-text">Error: ' + data.error + '</p>';
      return;
    }

    financieroDataGlobal = data;
    actualizarIndicadorFecha(data.ultima_actualizacion);
    pintarFinanciero();
  } catch (err) {
    body.innerHTML = '<p class="loading-text">Error de conexión</p>';
  }
}

function euros(valor) {
  const n = parseFloat(valor) || 0;
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

const ETIQUETAS_FORMA_PAGO = {
  'transferencia': 'Transferencia',
  'efectivo-marbella': 'Efectivo Marbella',
  'efectivo-monda': 'Efectivo Monda',
  'tpv-marbella': 'TPV Marbella',
  'tpv-monda': 'TPV Monda'
};

function pintarFinanciero() {
  const data = financieroDataGlobal;
  const body = document.getElementById('content-body');
  const k = data.kpis;

  let html = `
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1rem;">
      <div style="background:#f7f6f2; border-radius:8px; padding:1rem;">
        <p style="font-size:13px; color:#6b6a64; margin:0 0 6px;">Total facturado</p>
        <p style="font-size:22px; font-weight:500; margin:0;">${euros(k.total_facturado)}</p>
      </div>
      <div style="background:#EAF3DE; border-radius:8px; padding:1rem;">
        <p style="font-size:13px; color:#27500A; margin:0 0 6px;">Cobrado</p>
        <p style="font-size:22px; font-weight:500; color:#173404; margin:0;">${euros(k.total_cobrado)}</p>
      </div>
      <div style="background:#FAEEDA; border-radius:8px; padding:1rem;">
        <p style="font-size:13px; color:#854F0B; margin:0 0 6px;">Pendiente de cobro</p>
        <p style="font-size:22px; font-weight:500; color:#412402; margin:0;">${euros(k.total_pendiente)}</p>
      </div>
      <div style="background:#FCEBEB; border-radius:8px; padding:1rem;">
        <p style="font-size:13px; color:#A32D2D; margin:0 0 6px;">Vencidas</p>
        <p style="font-size:22px; font-weight:500; color:#501313; margin:0;">${euros(k.total_vencidas)}</p>
      </div>
    </div>

    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-bottom:1.5rem;">
      <div style="background:#FCEBEB; border:0.5px solid #F3C9C9; border-radius:8px; padding:0.85rem 1rem; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="filtrarSoloSinRegistro()">
        <span style="font-size:18px;">⚠️</span>
        <div>
          <p style="font-size:13px; color:#A32D2D; margin:0; font-weight:500;">${data.facturas_sin_registro_caja} facturas pagadas sin registro en Caja</p>
          <p style="font-size:11px; color:#854F0B; margin:2px 0 0;">Haz clic para filtrar</p>
        </div>
      </div>
      <div style="background:#FAEEDA; border:0.5px solid #F0DCB0; border-radius:8px; padding:0.85rem 1rem; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="cambiarPestanaFinanciero('pnc'); filtrarSoloNoCuadranPNC();">
        <span style="font-size:18px;">⚖️</span>
        <div>
          <p style="font-size:13px; color:#854F0B; margin:0; font-weight:500;">${data.pnc_que_no_cuadran} proyectos PNC no cuadran</p>
          <p style="font-size:11px; color:#854F0B; margin:2px 0 0;">Haz clic para revisar</p>
        </div>
      </div>
    </div>

    <div style="display:flex; gap:4px; border-bottom:0.5px solid #e2e2de; margin-bottom:1rem;">
      <div id="tab-proyectos-fin" onclick="cambiarPestanaFinanciero('proyectos')" style="padding:8px 16px; font-size:13px; cursor:pointer;"></div>
      <div id="tab-facturas" onclick="cambiarPestanaFinanciero('facturas')" style="padding:8px 16px; font-size:13px; cursor:pointer;"></div>
      <div id="tab-pnc" onclick="cambiarPestanaFinanciero('pnc')" style="padding:8px 16px; font-size:13px; cursor:pointer;"></div>
    </div>

    <div id="financiero-filtros"></div>
    <div id="financiero-tabla"></div>
  `;

  body.innerHTML = html;
  cambiarPestanaFinanciero(pestanaFinancieroActiva);
}

function estiloTab(activa) {
  return activa
    ? 'font-weight:500; color:#0C447C; border-bottom:2px solid #378ADD;'
    : 'color:#6b6a64; border-bottom:2px solid transparent;';
}

function cambiarPestanaFinanciero(pestana) {
  pestanaFinancieroActiva = pestana;
  document.getElementById('tab-proyectos-fin').textContent = 'Proyectos';
  document.getElementById('tab-proyectos-fin').style.cssText += estiloTab(pestana === 'proyectos');
  document.getElementById('tab-facturas').textContent = 'Facturas';
  document.getElementById('tab-facturas').style.cssText += estiloTab(pestana === 'facturas');
  document.getElementById('tab-pnc').textContent = 'PNC (No confirmados)';
  document.getElementById('tab-pnc').style.cssText += estiloTab(pestana === 'pnc');

  if (pestana === 'proyectos') pintarFiltrosYTablaProyectos();
  else if (pestana === 'facturas') pintarFiltrosYTablaFacturas();
  else pintarFiltrosYTablaPNC();
}

function filtrarSoloSinRegistro() {
  cambiarPestanaFinanciero('facturas');
  setTimeout(() => {
    const sel = document.getElementById('filtro-forma-pago');
    if (sel) { sel.value = 'sin-registro'; aplicarFiltrosFacturas(); }
  }, 0);
}

function filtrarSoloNoCuadranPNC() {
  setTimeout(() => {
    const btn = document.getElementById('btn-pnc-no-cuadran');
    if (btn) btn.click();
  }, 0);
}

// ── PESTAÑA FACTURAS ──
function pintarFiltrosYTablaFacturas() {
  const data = financieroDataGlobal;
  const comerciales = [...new Set(data.cruce_facturas.map(f => f.comercial).filter(Boolean))].sort();

  document.getElementById('financiero-filtros').innerHTML = `
    <div style="display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; align-items:center;">
      <select id="filtro-forma-pago" onchange="aplicarFiltrosFacturas()" style="width:auto; font-size:13px;">
        <option value="">Forma de pago: Todas</option>
        <option value="transferencia">Transferencia</option>
        <option value="efectivo-marbella">Efectivo Marbella</option>
        <option value="efectivo-monda">Efectivo Monda</option>
        <option value="tpv-marbella">TPV Marbella</option>
        <option value="tpv-monda">TPV Monda</option>
        <option value="sin-registro">Sin registro</option>
      </select>
      <select id="filtro-comercial" onchange="aplicarFiltrosFacturas()" style="width:auto; font-size:13px;">
        <option value="">Comercial: Todos</option>
        ${comerciales.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
      <select id="filtro-estado" onchange="aplicarFiltrosFacturas()" style="width:auto; font-size:13px;">
        <option value="">Estado: Todas</option>
        <option value="pagada">Pagadas</option>
        <option value="pendiente">Pendientes</option>
      </select>
      <div class="search-box" style="margin-left:auto;">
        <input type="text" id="buscador-facturas" placeholder="Buscar cliente o nº factura..." oninput="aplicarFiltrosFacturas()">
      </div>
    </div>
  `;

  renderTablaFacturas(data.cruce_facturas);
}

function aplicarFiltrosFacturas() {
  const data = financieroDataGlobal;
  const formaPago = document.getElementById('filtro-forma-pago').value;
  const comercial = document.getElementById('filtro-comercial').value;
  const estado = document.getElementById('filtro-estado').value;
  const busqueda = document.getElementById('buscador-facturas').value.toLowerCase();

  let filtradas = data.cruce_facturas;

  if (formaPago === 'sin-registro') filtradas = filtradas.filter(f => f.sin_registro_caja);
  else if (formaPago) filtradas = filtradas.filter(f => f.forma_pago_real === formaPago);

  if (comercial) filtradas = filtradas.filter(f => f.comercial === comercial);
  if (estado === 'pagada') filtradas = filtradas.filter(f => f.esta_pagada === 'SI');
  if (estado === 'pendiente') filtradas = filtradas.filter(f => f.esta_pagada !== 'SI');

  if (busqueda) {
    filtradas = filtradas.filter(f =>
      (f.cliente || '').toLowerCase().includes(busqueda) ||
      String(f.numero_factura || '').includes(busqueda)
    );
  }

  renderTablaFacturas(filtradas);
}

let ordenFacturas = { campo: 'numero_factura', asc: false };
let ordenPNC = { campo: 'numero', asc: false };

function ordenarLista(lista, orden) {
  const copia = [...lista];
  copia.sort((a, b) => {
    let va = a[orden.campo], vb = b[orden.campo];
    if (orden.campo.startsWith('fecha')) {
      va = parsearFechaDDMMYYYY(va); vb = parsearFechaDDMMYYYY(vb);
    } else if (typeof va === 'string') {
      va = (va || '').toLowerCase(); vb = (vb || '').toLowerCase();
    } else {
      va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
    }
    if (va < vb) return orden.asc ? -1 : 1;
    if (va > vb) return orden.asc ? 1 : -1;
    return 0;
  });
  return copia;
}

function parsearFechaDDMMYYYY(str) {
  if (!str) return new Date(0);
  const partes = String(str).split('/');
  if (partes.length !== 3) return new Date(0);
  return new Date(partes[2], partes[1] - 1, partes[0]);
}

function cambiarOrden(tabla, campo) {
  const orden = tabla === 'facturas' ? ordenFacturas : ordenPNC;
  if (orden.campo === campo) orden.asc = !orden.asc;
  else { orden.campo = campo; orden.asc = true; }
  if (tabla === 'facturas') aplicarFiltrosFacturas();
  else aplicarFiltrosPNC();
}

function flechaOrden(tabla, campo) {
  const orden = tabla === 'facturas' ? ordenFacturas : ordenPNC;
  if (orden.campo !== campo) return '';
  return orden.asc ? ' ▲' : ' ▼';
}

function renderTablaFacturas(lista) {
  const ordenada = ordenarLista(lista, ordenFacturas);
  let html = `
    <table>
      <thead>
        <tr>
          <th style="cursor:pointer;" onclick="cambiarOrden('facturas','numero_factura')">Nº Factura${flechaOrden('facturas','numero_factura')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrden('facturas','fecha_entrega')">Fecha proyecto${flechaOrden('facturas','fecha_entrega')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrden('facturas','cliente')">Cliente${flechaOrden('facturas','cliente')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrden('facturas','comercial')">Comercial${flechaOrden('facturas','comercial')}</th>
          <th>Estado proyecto</th>
          <th style="text-align:right; cursor:pointer;" onclick="cambiarOrden('facturas','importe_con_iva')">Importe${flechaOrden('facturas','importe_con_iva')}</th>
          <th style="text-align:right;">Cobrado</th>
          <th>Estado factura</th>
          <th>Forma de pago</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
  `;

  if (ordenada.length === 0) {
    html += '<tr><td colspan="10" style="padding:1.5rem 4px; color:#9a988f;">Sin resultados para este filtro.</td></tr>';
  }

  ordenada.forEach(f => {
    const badgeEstado = f.esta_pagada === 'SI'
      ? '<span class="badge badge-success">Pagada</span>'
      : '<span class="badge badge-warning">Pendiente</span>';
    const formaPagoHtml = f.sin_registro_caja
      ? '<span class="badge badge-danger">Sin registro</span>'
      : (f.es_rectificativa_a_cero
          ? '<span class="badge badge-neutral">Rectificativa</span>'
          : (f.forma_pago ? ETIQUETAS_FORMA_PAGO[f.forma_pago] || f.forma_pago : '<span style="color:#9a988f;">—</span>'));
    const badgeCuadra = f.cuadra_con_cobro
      ? '<span class="badge badge-success">Cuadra</span>'
      : '<span class="badge badge-danger">No cuadra</span>';

    html += `
      <tr>
        <td>${f.numero_factura}</td>
        <td>${f.fecha_entrega || '<span style="color:#9a988f;">—</span>'}</td>
        <td>${f.cliente || ''}</td>
        <td>${f.comercial || ''}</td>

let ordenProyectosFin = { campo: 'numero', asc: false };

function pintarFiltrosYTablaProyectos() {
  const data = financieroDataGlobal;

      <button id="btn-proy-todos" onclick="filtrarProyectosFin('todos')" class="pnc-filtro-btn">Todos</button>
      <button id="btn-proy-pend-facturar" onclick="filtrarProyectosFin('pend-facturar')" class="pnc-filtro-btn">Pendiente facturar</button>

function filtrarProyectosFin(modo) {
  window.filtroProyectosFinActivo = modo;
  actualizarEstiloBotonesProyectosFin();
  aplicarFiltrosProyectosFin();
}

function actualizarEstiloBotonesProyectosFin() {
  const activo = window.filtroProyectosFinActivo;
  const estilo = (esActivo) => 'font-size:13px; padding:6px 14px; border-radius:8px; ' + (esActivo
    ? 'background:#e6f1fb; color:#0C447C; border:0.5px solid #B5D4F4;'
    : 'background:#fff; color:#4a4944; border:0.5px solid #e2e2de;');
  document.getElementById('btn-proy-todos').style.cssText = estilo(activo === 'todos');
  document.getElementById('btn-proy-pend-facturar').style.cssText = estilo(activo === 'pend-facturar');
  document.getElementById('btn-proy-pend-cobrar').style.cssText = estilo(activo === 'pend-cobrar');
}

function aplicarFiltrosProyectosFin() {
  const data = financieroDataGlobal;
  const comercial = document.getElementById('filtro-proy-comercial').value;
  const busqueda = document.getElementById('buscador-proy-fin').value.toLowerCase();

  let filtrados = data.cruce_proyectos;

  if (window.filtroProyectosFinActivo === 'pend-facturar') filtrados = filtrados.filter(p => Math.abs(p.pendiente_facturar) >= 0.05);
  if (window.filtroProyectosFinActivo === 'pend-cobrar') filtrados = filtrados.filter(p => Math.abs(p.pendiente_cobrar) >= 0.05);
  if (comercial) filtrados = filtrados.filter(p => p.comercial === comercial);
  if (busqueda) {
    filtrados = filtrados.filter(p =>
      (p.cliente || '').toLowerCase().includes(busqueda) ||
      String(p.numero || '').includes(busqueda)
    );
  }

  renderTablaProyectosFin(filtrados);
}

function renderTablaProyectosFin(lista) {
  const ordenada = ordenarLista(lista, ordenProyectosFin);
  let html = `
    <table>
      <thead>
        <tr>
          <th style="cursor:pointer;" onclick="cambiarOrdenProyectosFin('numero')">Nº${flechaOrdenProyectosFin('numero')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrdenProyectosFin('fecha_entrega')">Fecha${flechaOrdenProyectosFin('fecha_entrega')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrdenProyectosFin('cliente')">Cliente${flechaOrdenProyectosFin('cliente')}</th>
          <th style="cursor:pointer;" onclick="cambiarOrdenProyectosFin('comercial')">Comercial${flechaOrdenProyectosFin('comercial')}</th>
          <th>Estado</th>
          <th style="text-align:right; cursor:pointer;" onclick="cambiarOrdenProyectosFin('valor_proyecto')">Valor${flechaOrdenProyectosFin('valor_proyecto')}</th>
          <th style="text-align:right; cursor:pointer;" onclick="cambiarOrdenProyectosFin('total_facturado')">Facturado${flechaOrdenProyectosFin('total_facturado')}</th>
          <th style="text-align:right; cursor:pointer;" onclick="cambiarOrdenProyectosFin('total_cobrado')">Cobrado${flechaOrdenProyectosFin('total_cobrado')}</th>
          <th style="text-align:right;">Pend. facturar</th>
          <th style="text-align:right;">Pend. cobrar</th>
        </tr>
      </thead>
      <tbody>
  `;

  if (ordenada.length === 0) {
    html += '<tr><td colspan="10" style="padding:1.5rem 4px; color:#9a988f;">Sin resultados para este filtro.</td></tr>';
  }

  ordenada.forEach(p => {
    const colorPendFacturar = Math.abs(p.pendiente_facturar) >= 0.05 ? '#854F0B' : '#9a988f';
    const colorPendCobrar = Math.abs(p.pendiente_cobrar) >= 0.05 ? '#A32D2D' : '#9a988f';
    const badgePNC = p.es_pnc ? ' <span class="badge badge-neutral" style="font-size:11px;">PNC</span>' : '';

    html += `
      <tr>
        <td>${p.numero}${badgePNC}</td>
        <td>${p.fecha_entrega || '<span style="color:#9a988f;">—</span>'}</td>
        <td>${p.cliente || ''}</td>
        <td>${p.comercial || ''}</td>
        <td><span class="badge badge-neutral">${p.estado || '—'}</span></td>
        <td style="text-align:right;">${euros(p.valor_proyecto)}</td>
        <td style="text-align:right;">${euros(p.total_facturado)}</td>
        <td style="text-align:right;">${euros(p.total_cobrado)}</td>
        <td style="text-align:right; color:${colorPendFacturar};">${euros(p.pendiente_facturar)}</td>
        <td style="text-align:right; color:${colorPendCobrar}; font-weight:500;">${euros(p.pendiente_cobrar)}</td>
      </tr>
    `;
  });

  html += '</tbody></table>';
  document.getElementById('financiero-tabla').innerHTML = html;
}

function cambiarOrdenProyectosFin(campo) {
  if (ordenProyectosFin.campo === campo) ordenProyectosFin.asc = !ordenProyectosFin.asc;
  else { ordenProyectosFin.campo = campo; ordenProyectosFin.asc = true; }
  aplicarFiltrosProyectosFin();
}

function flechaOrdenProyectosFin(campo) {
  if (ordenProyectosFin.campo !== campo) return '';
  return ordenProyectosFin.asc ? ' ▲' : ' ▼';
}

// ── CARGAR PROYECTOS ──
async function cargarProyectos() {
  document.getElementById('content-title').textContent = 'Proyectos';
  const body = document.getElementById('content-body');
  body.innerHTML = '<p class="loading-text">Cargando proyectos...</p>';

  try {
    const resp = await fetch('/api/proyectos');
    const data = await resp.json();

    if (data.error) {
      body.innerHTML = '<p class="loading-text">Error: ' + data.error + '</p>';
      return;
    }

    actualizarIndicadorFecha(data.ultima_actualizacion);
    pintarTablaProyectos(data.data);
  } catch (err) {
    body.innerHTML = '<p class="loading-text">Error de conexión</p>';
  }
}

function actualizarIndicadorFecha(fecha) {
  const textEl = document.getElementById('last-update-text');
  const indicatorEl = document.getElementById('last-update-indicator');
  if (!fecha) {
    textEl.textContent = 'Sin datos';
    indicatorEl.classList.add('stale');
    return;
  }
  textEl.textContent = 'Actualizado ' + fecha;

  const [fechaParte, horaParte] = fecha.split(' ');
  const [dia, mes, anio] = fechaParte.split('/');
  const fechaObj = new Date(anio, mes - 1, dia, ...horaParte.split(':'));
  const diffHoras = (new Date() - fechaObj) / (1000 * 60 * 60);
  indicatorEl.classList.toggle('stale', diffHoras > 2);
}

function pintarTablaProyectos(proyectos) {
  const body = document.getElementById('content-body');

  if (!proyectos || proyectos.length === 0) {
    body.innerHTML = '<p class="loading-text">No hay proyectos para mostrar.</p>';
    return;
  }

  let html = `
    <div style="margin-bottom: 1rem;" class="search-box">
      <input type="text" id="buscador-proyectos" placeholder="Buscar cliente o proyecto...">
    </div>
    <table>
      <thead>
        <tr>
          <th>Nº</th>
          <th>Cliente</th>
          <th>Comercial</th>
          <th>Estado</th>
          <th style="text-align:right;">Importe</th>
        </tr>
      </thead>
      <tbody id="tabla-proyectos-body">
  `;

  proyectos.forEach(p => {
    html += filaProyecto(p);
  });

  html += '</tbody></table>';
  body.innerHTML = html;

  document.getElementById('buscador-proyectos').addEventListener('input', (e) => {
    const filtro = e.target.value.toLowerCase();
    const filtrados = proyectos.filter(p =>
      (p.cliente || '').toLowerCase().includes(filtro) ||
      String(p.numero || '').includes(filtro)
    );
    document.getElementById('tabla-proyectos-body').innerHTML = filtrados.map(filaProyecto).join('');
  });
}

function filaProyecto(p) {
  const badgeClass = badgeParaEstado(p.estado);
  return `
    <tr>
      <td>${p.numero || ''}</td>
      <td>${p.cliente || ''}</td>
      <td>${p.comercial || ''}</td>
      <td><span class="badge ${badgeClass}">${p.estado || ''}</span></td>
      <td style="text-align:right;">${formatearEuros(p.valor)}</td>
    </tr>
  `;
}

function badgeParaEstado(estado) {
  if (estado === 'Canceled') return 'badge-danger';
  if (estado === 'Pending' || estado === 'Concept') return 'badge-warning';
  return 'badge-success';
}

function formatearEuros(valor) {
  const n = parseFloat(valor) || 0;
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}
